x-runner-environment: &runner-environment
  ENVIRONMENT: development
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  REDIS_ENABLED: ${REDIS_ENABLED:-true}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_DB: ${REDIS_DB:-0}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  DATABASE_URL_CORE: postgresql://${POSTGRES_CORE_USER:-mindscape}:${POSTGRES_CORE_PASSWORD:-mindscape_password}@postgres:5432/${POSTGRES_CORE_DB:-mindscape_core}
  DATABASE_URL_VECTOR: postgresql://${POSTGRES_VECTOR_USER:-mindscape}:${POSTGRES_VECTOR_PASSWORD:-mindscape_password}@postgres:5432/${POSTGRES_VECTOR_DB:-mindscape_vectors}
  DATABASE_URL: postgresql://${POSTGRES_CORE_USER:-mindscape}:${POSTGRES_CORE_PASSWORD:-mindscape_password}@postgres:5432/${POSTGRES_CORE_DB:-mindscape_core}
  POSTGRES_CORE_HOST: postgres
  POSTGRES_CORE_PORT: 5432
  POSTGRES_CORE_DB: ${POSTGRES_CORE_DB:-mindscape_core}
  POSTGRES_CORE_USER: ${POSTGRES_CORE_USER:-mindscape}
  POSTGRES_CORE_PASSWORD: ${POSTGRES_CORE_PASSWORD:-mindscape_password}
  POSTGRES_VECTOR_HOST: postgres
  POSTGRES_VECTOR_PORT: 5432
  POSTGRES_VECTOR_DB: ${POSTGRES_VECTOR_DB:-mindscape_vectors}
  POSTGRES_VECTOR_USER: ${POSTGRES_VECTOR_USER:-mindscape}
  POSTGRES_VECTOR_PASSWORD: ${POSTGRES_VECTOR_PASSWORD:-mindscape_password}
  POSTGRES_HOST: ${POSTGRES_CORE_HOST:-postgres}
  POSTGRES_PORT: ${POSTGRES_CORE_PORT:-5432}
  POSTGRES_DB: ${POSTGRES_CORE_DB:-mindscape_core}
  POSTGRES_USER: ${POSTGRES_CORE_USER:-mindscape}
  POSTGRES_PASSWORD: ${POSTGRES_CORE_PASSWORD:-mindscape_password}
  PYTHONPATH: /app:/app/backend:/app/backend/app
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
  OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
  IG_REFERENCE_CATALOG_MODE: ${IG_REFERENCE_CATALOG_MODE:-dual}
  WORKSPACE_STORAGE_ROOT: ${WORKSPACE_STORAGE_ROOT:-/root/.mindscape/workspaces}
  MINDSCAPE_MODEL_ROOT: ${MINDSCAPE_MODEL_ROOT:-/root/.mindscape/models}
  MINDSCAPE_STORAGE_HOST_DIR: ${MINDSCAPE_STORAGE_HOST_DIR:-${HOME}/.mindscape/storage}
  MINDSCAPE_MODELS_HOST_DIR: ${MINDSCAPE_MODELS_HOST_DIR:-${HOME}/.mindscape/models}
  LAF_HOST_RUNTIME_ROOT: ${LAF_HOST_RUNTIME_ROOT:-~/.mindscape/runtimes/layer_asset_forge}
  LOCAL_CORE_PROJECT_ROOT: ${LOCAL_CORE_PROJECT_ROOT:-${PWD}}
  LOCAL_STORAGE_PATH: /root/.mindscape/storage/layer_asset_forge
  TZ: ${TZ:-UTC}
  LOCAL_CORE_RUNNER_PROCESS: "1"
  LOCAL_CORE_RUNNER_POLL_INTERVAL_MS: ${LOCAL_CORE_RUNNER_POLL_INTERVAL_MS:-1000}
  LOCAL_CORE_RUNNER_HEARTBEAT_INTERVAL_MS: ${LOCAL_CORE_RUNNER_HEARTBEAT_INTERVAL_MS:-15000}
  LOCAL_CORE_RUNNER_CANCEL_POLL_INTERVAL_MS: ${LOCAL_CORE_RUNNER_CANCEL_POLL_INTERVAL_MS:-2000}
  LOCAL_CORE_RUNNER_LOCK_TTL_SECONDS: ${LOCAL_CORE_RUNNER_LOCK_TTL_SECONDS:-3600}
  MEETING_DYNAMIC_ROUTING_ENABLED: ${MEETING_DYNAMIC_ROUTING_ENABLED:-false}
  MEETING_DYNAMIC_ROUTING_TRACE_ENABLED: ${MEETING_DYNAMIC_ROUTING_TRACE_ENABLED:-false}

x-runner-volumes: &runner-volumes
  - ./backend:/app/backend:rw
  - ./scripts:/app/scripts:rw
  - "${LOCAL_CORE_DATA_HOST_DIR:-./data}:/app/data:rw"
  - "${LOCAL_CORE_SECRETS_HOST_DIR:-./data/secrets}:/root/.mindscape:rw"
  - ${MINDSCAPE_MODELS_HOST_DIR:-${HOME}/.mindscape/models}:/root/.mindscape/models:rw
  - ${MINDSCAPE_STORAGE_HOST_DIR:-${HOME}/.mindscape/storage}:/root/.mindscape/storage:rw
  - "${LOCAL_CORE_LOGS_HOST_DIR:-./logs}:/app/logs:rw"
  - ./web-console:/app/web-console:rw

x-runner-common: &runner-common
  image: ${LOCAL_CORE_RUNNER_IMAGE:-mindscape-ai-local-core-runner}
  build:
    context: .
    dockerfile: Dockerfile.backend
  init: true
  shm_size: "2gb"
  restart: unless-stopped
  environment: *runner-environment
  volumes: *runner-volumes
  deploy:
    resources:
      limits:
        memory: 6g
  networks:
    - mindscape-network
  depends_on:
    backend:
      condition: service_healthy
    redis:
      condition: service_healthy
  entrypoint: ["python", "-m", "backend.app.runner.worker"]
  # Runner doesn't expose HTTP on :8200; it inherits Dockerfile.backend healthcheck which would fail.
  # Disable to avoid misleading "unhealthy" status.
  healthcheck:
    disable: true
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mindscape-ai-local-core-backend
    shm_size: "2gb"
    restart: unless-stopped
    ports:
      - "8200:8200"
      - "${SANDBOX_PREVIEW_PORT_START:-3002}-${SANDBOX_PREVIEW_PORT_END:-3020}:${SANDBOX_PREVIEW_PORT_START:-3002}-${SANDBOX_PREVIEW_PORT_END:-3020}"
    environment:
      # Sandbox preview port range
      - SANDBOX_PREVIEW_PORT_START=${SANDBOX_PREVIEW_PORT_START:-3002}
      - SANDBOX_PREVIEW_PORT_END=${SANDBOX_PREVIEW_PORT_END:-3020}
      - PYTHONPATH=/app:/app/backend:/app/backend/app
      - ENVIRONMENT=development
      - HOST=0.0.0.0
      - PORT=8200
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDIS_ENABLED=${REDIS_ENABLED:-true}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      # Database
      - DATABASE_URL_CORE=postgresql://${POSTGRES_CORE_USER:-mindscape}:${POSTGRES_CORE_PASSWORD:-mindscape_password}@postgres:5432/${POSTGRES_CORE_DB:-mindscape_core}
      - DATABASE_URL_VECTOR=postgresql://${POSTGRES_VECTOR_USER:-mindscape}:${POSTGRES_VECTOR_PASSWORD:-mindscape_password}@postgres:5432/${POSTGRES_VECTOR_DB:-mindscape_vectors}
      - DATABASE_URL=postgresql://${POSTGRES_CORE_USER:-mindscape}:${POSTGRES_CORE_PASSWORD:-mindscape_password}@postgres:5432/${POSTGRES_CORE_DB:-mindscape_core}
      # PostgreSQL core database
      - POSTGRES_CORE_HOST=postgres
      - POSTGRES_CORE_PORT=5432
      - POSTGRES_CORE_DB=${POSTGRES_CORE_DB:-mindscape_core}
      - POSTGRES_CORE_USER=${POSTGRES_CORE_USER:-mindscape}
      - POSTGRES_CORE_PASSWORD=${POSTGRES_CORE_PASSWORD:-mindscape_password}
      # PostgreSQL vector database
      - POSTGRES_VECTOR_HOST=postgres
      - POSTGRES_VECTOR_PORT=5432
      - POSTGRES_VECTOR_DB=${POSTGRES_VECTOR_DB:-mindscape_vectors}
      - POSTGRES_VECTOR_USER=${POSTGRES_VECTOR_USER:-mindscape}
      - POSTGRES_VECTOR_PASSWORD=${POSTGRES_VECTOR_PASSWORD:-mindscape_password}
      # Legacy fallback (core)
      - POSTGRES_HOST=${POSTGRES_CORE_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_CORE_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_CORE_DB:-mindscape_core}
      - POSTGRES_USER=${POSTGRES_CORE_USER:-mindscape}
      - POSTGRES_PASSWORD=${POSTGRES_CORE_PASSWORD:-mindscape_password}
      # Security
      - LOCAL_AUTH_SECRET=${LOCAL_AUTH_SECRET:-}
      # LLM Providers (configure these in .env file)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Ollama (Host) - Use host.docker.internal to access Ollama running on Mac/Windows host
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - IG_REFERENCE_CATALOG_MODE=${IG_REFERENCE_CATALOG_MODE:-dual}
      - WORKSPACE_STORAGE_ROOT=${WORKSPACE_STORAGE_ROOT:-/root/.mindscape/workspaces}
      - MINDSCAPE_MODEL_ROOT=${MINDSCAPE_MODEL_ROOT:-/root/.mindscape/models}
      - MINDSCAPE_STORAGE_HOST_DIR=${MINDSCAPE_STORAGE_HOST_DIR:-${HOME}/.mindscape/storage}
      - MINDSCAPE_MODELS_HOST_DIR=${MINDSCAPE_MODELS_HOST_DIR:-${HOME}/.mindscape/models}
      - LAF_HOST_RUNTIME_ROOT=${LAF_HOST_RUNTIME_ROOT:-~/.mindscape/runtimes/layer_asset_forge}
      - LOCAL_CORE_PROJECT_ROOT=${LOCAL_CORE_PROJECT_ROOT:-${PWD}}
      # LLM Intent Extractor
      - ENABLE_LLM_INTENT_EXTRACTOR=${ENABLE_LLM_INTENT_EXTRACTOR:-true}
      # D2: Legacy Cleanup - Disable legacy fallback
      - PLAYBOOK_DISABLE_LEGACY=${PLAYBOOK_DISABLE_LEGACY:-1}
      # Meeting routing feature flags
      - MEETING_DYNAMIC_ROUTING_ENABLED=${MEETING_DYNAMIC_ROUTING_ENABLED:-false}
      - MEETING_DYNAMIC_ROUTING_TRACE_ENABLED=${MEETING_DYNAMIC_ROUTING_TRACE_ENABLED:-false}
      # Cloud Extension (optional - leave empty to disable)
      # Note: CLOUD_API_URL should be configured in docker-compose.override.yml
      # to keep Local-Core configuration clean (architecture compliance)
      - CLOUD_API_URL=${CLOUD_API_URL:-}
      - CLOUD_LICENSE_KEY=${CLOUD_LICENSE_KEY:-}
      - XTTS_SERVICE_URL=${XTTS_SERVICE_URL:-http://xtts-service:8020}
      - LOCAL_STORAGE_PATH=/root/.mindscape/storage/layer_asset_forge
      # Timezone
      - TZ=${TZ:-UTC}
      # Host project path for bridge script reference
      - HOST_PROJECT_PATH=${HOST_PROJECT_PATH:-${PWD}}
    volumes:
      - ./backend:/app/backend:rw
      - ./scripts:/app/scripts:rw
      - "${LOCAL_CORE_DATA_HOST_DIR:-./data}:/app/data:rw"
      - "${LOCAL_CORE_SECRETS_HOST_DIR:-./data/secrets}:/root/.mindscape:rw"
      - ${MINDSCAPE_MODELS_HOST_DIR:-${HOME}/.mindscape/models}:/root/.mindscape/models:rw
      - ${MINDSCAPE_STORAGE_HOST_DIR:-${HOME}/.mindscape/storage}:/root/.mindscape/storage:rw
      - "${LOCAL_CORE_LOGS_HOST_DIR:-./logs}:/app/logs:rw"
      - ./web-console:/app/web-console:rw
      # Mount user's custom directory for workspace storage (optional)
      # Uncomment and set the path below to mount your Documents or other directory
      # Example for Mac: /Users/yourname/Documents:/host/documents:rw
      # Example for Windows: C:\Users\yourname\Documents:/host/documents:rw
      # The frontend will automatically convert host paths to /host/documents/... when saving
      # - ${HOME}/Documents:/host/documents:rw
      # HuggingFace model cache (shared with host)
      - ${HF_HOME:-${HOME}/.cache/huggingface}:/root/.cache/huggingface:rw

    deploy:
      resources:
        limits:
          memory: 6g
    networks:
      - mindscape-network
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8200/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  runner-default:
    <<: *runner-common
    container_name: mindscape-ai-local-core-runner-default
    environment:
      <<: *runner-environment
      LOCAL_CORE_RUNNER_PROFILE: default_local
      LOCAL_CORE_RUNNER_ACCEPTED_PARTITIONS: ${LOCAL_CORE_RUNNER_DEFAULT_ACCEPTED_PARTITIONS:-default_local}
      LOCAL_CORE_RUNNER_ACCEPTED_RESOURCE_CLASSES: ${LOCAL_CORE_RUNNER_DEFAULT_ACCEPTED_RESOURCE_CLASSES:-compute,api}
      LOCAL_CORE_RUNNER_MAX_INFLIGHT: ${LOCAL_CORE_RUNNER_DEFAULT_MAX_INFLIGHT:-8}

  runner-browser:
    <<: *runner-common
    container_name: mindscape-ai-local-core-runner-browser
    environment:
      <<: *runner-environment
      LOCAL_CORE_RUNNER_PROFILE: browser_local
      LOCAL_CORE_RUNNER_ACCEPTED_PARTITIONS: ${LOCAL_CORE_RUNNER_BROWSER_ACCEPTED_PARTITIONS:-browser_local}
      LOCAL_CORE_RUNNER_ACCEPTED_RESOURCE_CLASSES: ${LOCAL_CORE_RUNNER_BROWSER_ACCEPTED_RESOURCE_CLASSES:-browser}
      # Total browser-runner task cap. Lock-specific concurrency still applies inside this ceiling.
      LOCAL_CORE_RUNNER_MAX_INFLIGHT: ${LOCAL_CORE_RUNNER_BROWSER_MAX_INFLIGHT:-2}
      # Cap concurrent thumbnail browser fallbacks without changing task semantics.
      IG_THUMBNAIL_BROWSER_FALLBACK_MAX_INFLIGHT: ${IG_THUMBNAIL_BROWSER_FALLBACK_MAX_INFLIGHT:-1}

  runner-vision:
    <<: *runner-common
    container_name: mindscape-ai-local-core-runner-vision
    environment:
      <<: *runner-environment
      LOCAL_CORE_RUNNER_PROFILE: vision_local
      LOCAL_CORE_RUNNER_ACCEPTED_PARTITIONS: ${LOCAL_CORE_RUNNER_VISION_ACCEPTED_PARTITIONS:-vision_local}
      LOCAL_CORE_RUNNER_ACCEPTED_RESOURCE_CLASSES: ${LOCAL_CORE_RUNNER_VISION_ACCEPTED_RESOURCE_CLASSES:-compute}
      LOCAL_CORE_RUNNER_MAX_INFLIGHT: ${LOCAL_CORE_RUNNER_VISION_MAX_INFLIGHT:-4}

  # Frontend Web Console
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mindscape-ai-local-core-frontend
    restart: unless-stopped
    ports:
      - "8300:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_API_URL=http://localhost:8200
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8200
      - BACKEND_URL=http://backend:8200
      - MEDIA_PROXY_URL=http://media-proxy:8000
      - TZ=${TZ:-UTC}
    volumes:
      - ./web-console/src:/app/web-console/src:ro
      - ./web-console/tsconfig.json:/app/web-console/tsconfig.json:ro
      - ./web-console/next.config.js:/app/web-console/next.config.js:ro
      - ./web-console/tailwind.config.js:/app/web-console/tailwind.config.js:ro
      - ./web-console/postcss.config.js:/app/web-console/postcss.config.js:ro
      - ./packages:/app/packages:ro

    networks:
      - mindscape-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      backend:
        condition: service_healthy

  # PostgreSQL with pgvector for vector storage (optional)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mindscape-ai-local-core-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_CORE_DB:-mindscape_core}
      - POSTGRES_USER=${POSTGRES_CORE_USER:-mindscape}
      - POSTGRES_PASSWORD=${POSTGRES_CORE_PASSWORD:-mindscape_password}
      - POSTGRES_CORE_DB=${POSTGRES_CORE_DB:-mindscape_core}
      - POSTGRES_VECTOR_DB=${POSTGRES_VECTOR_DB:-mindscape_vectors}
      - PGDATA=/var/lib/postgresql/data/pgdata
      - TZ=${TZ:-UTC}
    volumes:
      - "${LOCAL_CORE_POSTGRES_HOST_DIR:-./data/postgres}:/var/lib/postgresql/data"
      - ./docker/postgres/init-dual-dbs.sh:/docker-entrypoint-initdb.d/00-init-dual-dbs.sh:ro
    networks:
      - mindscape-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_CORE_USER:-mindscape} -d ${POSTGRES_CORE_DB:-mindscape_core}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: mindscape-ai-local-core-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
    networks:
      - mindscape-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # OCR Service (Local PaddleOCR)
  # XTTS-first local preview mode:
  # keep OCR as an opt-in profile so default `docker compose up -d`
  # preserves memory/CPU headroom for XTTS.
  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    container_name: mindscape-ai-local-core-ocr
    profiles:
      - ocr
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - OCR_USE_GPU=${OCR_USE_GPU:-false}
      - OCR_LANG=${OCR_LANG:-ch}
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - TZ=${TZ:-UTC}
      - PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK=True
    volumes:
      - "${LOCAL_CORE_DATA_HOST_DIR:-./data}:/app/data:ro"
    networks:
      - mindscape-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Media Proxy Service (Isolated)
  media-proxy:
    build:
      context: ./media-proxy
      dockerfile: Dockerfile
    container_name: mindscape-ai-local-core-media-proxy
    restart: unless-stopped
    ports:
      - "8202:8000"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=${TZ:-UTC}
    networks:
      - mindscape-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # XTTS-v2 Local TTS Service (G4 Audio Course)
  xtts-service:
    build:
      context: ./xtts-service
      dockerfile: Dockerfile
    container_name: mindscape-ai-local-core-xtts
    restart: unless-stopped
    ports:
      - "8020:8020"
    environment:
      - COQUI_TOS_AGREED=1
      - XTTS_VOICES_DIR=/app/voices
      - XTTS_DEFAULT_LANGUAGE=${XTTS_DEFAULT_LANGUAGE:-zh-cn}
      - XTTS_USE_GPU=${XTTS_USE_GPU:-auto}
      - TZ=${TZ:-UTC}
    volumes:
      - ./xtts-service/main.py:/app/main.py:ro
      - "${LOCAL_CORE_TTS_VOICES_HOST_DIR:-./data/tts/voices}:/app/voices:rw"
      - "${LOCAL_CORE_TTS_OUTPUT_HOST_DIR:-./data/tts/output}:/app/data/tts/output:rw"
      - xtts_model_cache:/root/.local/share/tts
    networks:
      - mindscape-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8020/health')",
        ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 120s

  whisper-service:
    build:
      context: ./services/whisper
      dockerfile: Dockerfile
    container_name: mindscape-ai-local-core-whisper
    restart: unless-stopped
    ports:
      - "8006:8006"
    networks:
      - mindscape-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  xtts_model_cache:
    driver: local

networks:
  mindscape-network:
    driver: bridge
    name: mindscape-network
