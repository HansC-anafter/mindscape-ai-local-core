code: comfyui_runtime
display_name: "ComfyUI Runtime"
version: "1.2.0"
type: feature
description: "Infrastructure management for ComfyUI rendering engine. Supports local GPU (CUDA/MPS) and remote execution."
category: infrastructure
tags:
  - rendering
  - infrastructure
  - gpu
  - comfyui

portability:
  min_local_core_version: "0.9.0"
  environments:
    - local-core
    - cloud
  degradation_strategy: graceful

dependencies:
  required: []
  optional:
    - code: storage
    - code: video_renderer

# Tools
tools:
  - code: comfyui_detect_platform
    name: comfyui_detect_platform
    description: "Detect GPU platform and recommend installation profile"
    backend: capabilities.comfyui_runtime.tools.detect_platform:detect_platform

  - code: comfyui_install
    name: comfyui_install
    description: "Install ComfyUI natively (git clone + venv) or via Docker"
    backend: capabilities.comfyui_runtime.tools.install:install_comfyui
    input_schema:
      type: object
      properties:
        install_path:
          type: string
          description: "Target directory for installation (default: ~/.mindscape/comfyui)"
        force_reinstall:
          type: boolean
          default: false

  - code: comfyui_start
    name: comfyui_start
    description: "Start ComfyUI server process and wait for readiness"
    backend: capabilities.comfyui_runtime.tools.start:start_comfyui
    input_schema:
      type: object
      properties:
        install_path:
          type: string
          description: "Path to ComfyUI installation directory"
          default: "~/.mindscape/comfyui"
        port:
          type: integer
          description: "Port to run ComfyUI on"
          default: 8188
        listen:
          type: string
          description: "Address to listen on"
          default: "127.0.0.1"
        timeout:
          type: integer
          description: "Seconds to wait for server health"
          default: 30

  - code: comfyui_download_models
    name: comfyui_download_models
    description: "Download models based on selected profile"
    backend: capabilities.comfyui_runtime.tools.download_models:download_models
    input_schema:
      type: object
      required: [profile_id]
      properties:
        profile_id:
          type: string
          enum: [vr_minimal, vr_preview_local, vr_generative, vr_wan22_14b_kj]
        models_dir:
          type: string
          description: "Target models directory"

  - code: comfyui_health_check
    name: comfyui_health_check
    description: "Validate ComfyUI server health and loaded models"
    backend: capabilities.comfyui_runtime.tools.health_check:health_check
    input_schema:
      type: object
      properties:
        comfyui_url:
          type: string
          default: "http://localhost:8188"

  - code: comfyui_register
    name: comfyui_register
    description: "Register ComfyUI URL in runtime configuration"
    backend: capabilities.comfyui_runtime.tools.register:register_comfyui
    input_schema:
      type: object
      required: [comfyui_url]
      properties:
        comfyui_url:
          type: string
        runtime_id:
          type: string
          description: "Optional runtime ID to update"

# Playbooks
playbooks:
  - code: comfyui_setup
    display_name: "ComfyUI Setup"
    display_name_zh: "ComfyUI 安裝設置"
    locales: [zh-TW, en]
    path: playbooks/{locale}/comfyui_setup.md
    spec_path: playbooks/specs/comfyui_setup.json
    description: "Install ComfyUI, download models, and register runtime"
    description_zh: "安裝 ComfyUI、下載模型並註冊執行環境"
    tool_dependencies:
      - comfyui_runtime.comfyui_detect_platform
      - comfyui_runtime.comfyui_install
      - comfyui_runtime.comfyui_start
      - comfyui_runtime.comfyui_download_models
      - comfyui_runtime.comfyui_health_check
      - comfyui_runtime.comfyui_register

# API Routes
apis:
  - code: comfyui_runtime
    path: api/__init__.py
    router_export: router
    prefix: /api/v1/capabilities/comfyui_runtime
    enabled_by_default: true

# UI Components
ui_components:
  - code: ComfyUIRuntimeSettingsPanel
    path: ui/components/ComfyUIRuntimeSettingsPanel.tsx
    display_name: "ComfyUI Local Runtime Settings"
    description: "Configure host-side ComfyUI install path and validate access"
    export: "default"
    settings:
      section: "runtime-environments"
      title: "ComfyUI Local Runtime"
      description: "Manage the host ComfyUI install path from the capability pack"
      order: 40
      requires_workspace_id: false
      display_mode: "runtime_modal"
      show_when:
        runtime_codes:
          - comfyui
          - comfyui_local
          - comfyui_runtime
  - code: ComfyUIRuntimePanel
    path: ui/components/ComfyUIRuntimePanel.tsx
    display_name: "ComfyUI Runtime"
    description: "Manage ComfyUI installation, models, and status"
    export: "default"
    settings:
      section: "workflow-engines"
      title: "ComfyUI Runtime"
      order: 50
      requires_workspace_id: false
      show_when:
        always: true

# Model Definitions
models:
  # SDXL - Stable Diffusion XL (Image Generation / Style Transfer)
