    provider: huggingface
    repo_id: "stabilityai/stable-diffusion-xl-base-1.0"
    revision: "main"
    files:
      - filename: "sd_xl_base_1.0.safetensors"
        expected_hash: "sha256:placeholder_hash_sdxl"
        size_bytes: 6940000000
    license:
      spdx_id: "OpenRAIL++-M"
