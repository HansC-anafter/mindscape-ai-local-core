    model_ids: []

  - profile_id: vr_preview_local
    display_name: "Local Preview (High Speed)"
    description: "Dual-lane local preview: SDXL Lightning for text/style preview plus SD1.5 OpenPose for pose-guided preview on macOS (MPS)."
    model_ids:
      - sdxl_lightning_4step
      - sdxl_clip_l
      - sdxl_clip_g
      - sd15_base_1_5
      - controlnet_openpose_v11p
      - sdxl_vae

  - profile_id: vr_generative
    display_name: "Generative Production"
    description: "SDXL Base + ControlNet OpenPose + ControlNet Depth + VAE. Standard quality."
